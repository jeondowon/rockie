<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Desktop Pet</title>
    <!-- 도트 폰트 (Galmuri) 로컬 번들. 오프라인에서도 표시, 로드 실패 시 monospace 폴백 -->
    <link rel="stylesheet" href="../../../assets/fonts/galmuri.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="onboarding-locked">
    <div id="bubble" class="bubble hidden"></div>
    <img
      id="character"
      class="character"
      src="../../../assets/gif/level0/rockie_right.gif"
      alt="pet"
      draggable="false"
    />
    <!-- 애정 표현용 하트 오버레이(캐릭터와 같은 320 캔버스). 캐릭터 박스에 겹쳐 표시 -->
    <img
      id="heart"
      class="heart hidden"
      src="../../../assets/gif/heart.gif"
      alt=""
      draggable="false"
    />
    <div id="qcard" class="qcard hidden"></div>

    <script src="../shared/sprites.js"></script>
    <script src="../shared/sound.js"></script>
    <script src="pet.js"></script>
  </body>
</html>
