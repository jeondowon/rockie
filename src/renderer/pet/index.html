<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Desktop Pet</title>
    <!-- 질문 카드용 도트 폰트 (Galmuri). 오프라인이면 monospace로 폴백 -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/galmuri/dist/galmuri.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="bubble" class="bubble hidden"></div>
    <img
      id="character"
      class="character"
      src="../../../assets/gif/level0/rockie_right.gif"
      alt="pet"
      draggable="false"
    />
    <!-- 애정 표현용 하트 오버레이(캐릭터와 같은 320 캔버스). 캐릭터 박스에 겹쳐 표시 -->
    <img
      id="heart"
      class="heart hidden"
      src="../../../assets/gif/heart.gif"
      alt=""
      draggable="false"
    />
    <div id="qcard" class="qcard hidden"></div>

    <script src="../shared/sprites.js"></script>
    <script src="pet.js"></script>
  </body>
</html>
